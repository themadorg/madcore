# E2E tests — madcore SDK against a live madmail instance (Alice↔Bob on one relay).
name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    name: Smoke (madmail + 2-party)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start madmail
        run: bash scripts/ci/start-madmail.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Smoke tests
        env:
          SERVER_URL: http://127.0.0.1:8080
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: bun run test:ci-smoke

      - name: Stop madmail
        if: always()
        run: bash scripts/ci/stop-madmail.sh

  e2e-full:
    name: Full E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start madmail
        run: bash scripts/ci/start-madmail.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Full E2E tests
        env:
          SERVER_URL: http://127.0.0.1:8080
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          JOIN_TIMEOUT_MS: "120000"
        run: bun run test:ci-e2e

      - name: Stop madmail
        if: always()
        run: bash scripts/ci/stop-madmail.sh