# Publish to npmjs.com and GitHub Packages after a GitHub Release is published.
#
# Prerequisites
#   • Repository secret NPM_TOKEN — npm automation/publish token with write access
#   • package.json "version" must match the release tag (e.g. v2.0.0 → 2.0.0)
#   • GitHub Packages publishes as @<owner>/madcore (scoped); npm keeps madcore
#
# Manual re-run: Actions → Publish → Run workflow (uses latest release tag or input)
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v2.0.0). Leave empty to use package.json version.'
        required: false
        type: string

concurrency:
  group: publish-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write   # npm provenance

jobs:
  # ── Guard: CI-equivalent checks before any publish ─────────────────────────
  check:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${PKG_VERSION}"
          fi
          # Strip leading v for version compare
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing version $PKG_VERSION (tag $TAG)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── npmjs.com ──────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install & build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Packages (@owner/madcore) ───────────────────────────────────
  publish-github-packages:
    name: Publish to GitHub Packages
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Install & build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Scope package name for GitHub Packages
        run: |
          node <<'NODE'
          const fs = require('fs');
          const owner = process.env.OWNER.toLowerCase();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const base = pkg.name.replace(/^@[^/]+\//, '');
          pkg.name = `@${owner}/${base}`;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: 'https://npm.pkg.github.com',
            access: 'restricted',
          };
          // Help GitHub link the package back to this repo
          pkg.repository = pkg.repository || {
            type: 'git',
            url: `git+https://github.com/${process.env.REPO}.git`,
          };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Publishing as', pkg.name, pkg.version);
          NODE
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
