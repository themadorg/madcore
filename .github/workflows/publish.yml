# Publish to npmjs.com and GitHub Packages after a GitHub Release is published.
#
# npm (Trusted Publishing / OIDC) — no NPM_TOKEN secret
#   • package.json "version" must match the release tag (e.g. v1.0.1 → 1.0.1)
#   • Configure Trusted Publisher on npmjs.com for package "madcore":
#       Organization or user: themadorg
#       Repository:           madcore
#       Workflow filename:    publish.yml
#       Allowed actions:      npm publish
#   • First-ever version: the package must already exist on npm before OIDC
#     can be configured. Bootstrap once from a trusted machine:
#       npm login && npm publish --access public
#     Then add the Trusted Publisher above for all later releases.
#   • Requires npm CLI ≥ 11.5.1 and Node ≥ 22.14 (OIDC in the CLI)
#   • Provenance is generated automatically with trusted publishing
#
# GitHub Packages
#   • Publishes as @<owner>/madcore using GITHUB_TOKEN
#
# Manual re-run: Actions → Publish → Run workflow
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.0.1). Leave empty to use package.json version.'
        required: false
        type: string

concurrency:
  group: publish-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write   # OIDC for npm trusted publishing + provenance

jobs:
  # ── Guard: CI-equivalent checks before any publish ─────────────────────────
  check:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${PKG_VERSION}"
          fi
          # Strip leading v for version compare
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing version $PKG_VERSION (tag $TAG)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── npmjs.com (Trusted Publishing via OIDC) ────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write   # required for OIDC exchange with registry.npmjs.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Trusted publishing needs Node ≥ 22.14 and npm ≥ 11.5.1
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@latest
          node -v
          NPM_VERSION=$(npm -v)
          echo "npm version: $NPM_VERSION"
          # Fail fast if npm is still too old for trusted publishing (≥ 11.5.1)
          node -e "
            const [maj, min, pat] = process.argv[1].split('.').map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && pat >= 1)));
            if (!ok) {
              console.error('npm >= 11.5.1 required for trusted publishing, got', process.argv[1]);
              process.exit(1);
            }
          " "$NPM_VERSION"

      - name: Install & build
        run: |
          bun install --frozen-lockfile
          bun run build

      # OIDC auth: do NOT set NODE_AUTH_TOKEN. A non-empty token forces token
      # auth and blocks trusted publishing. setup-node may leave a placeholder
      # in .npmrc; clearing the env var lets npm use the GitHub OIDC token.
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN || true
          npm publish --access public
        env:
          # Explicitly empty so setup-node's ${NODE_AUTH_TOKEN} .npmrc line
          # cannot override OIDC
          NODE_AUTH_TOKEN: ''

  # ── GitHub Packages (@owner/madcore) ───────────────────────────────────
  publish-github-packages:
    name: Publish to GitHub Packages
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Install & build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Scope package name for GitHub Packages
        run: |
          node <<'NODE'
          const fs = require('fs');
          const owner = process.env.OWNER.toLowerCase();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const base = pkg.name.replace(/^@[^/]+\//, '');
          pkg.name = `@${owner}/${base}`;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: 'https://npm.pkg.github.com',
            access: 'restricted',
          };
          // Help GitHub link the package back to this repo
          pkg.repository = pkg.repository || {
            type: 'git',
            url: `git+https://github.com/${process.env.REPO}.git`,
          };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Publishing as', pkg.name, pkg.version);
          NODE
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
